apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: linker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: blessedsoft/dev-link-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            - name: INTERNAL_API_URL
              valueFrom:
                configMapKeyRef:
                  name: linker-config
                  key: INTERNAL_API_URL
