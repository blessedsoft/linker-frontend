name: Docker Build, Scan and Push v1

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore: 
      - '**/*.md'
      - '.github/workflows/**'

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/linker-frontend

jobs:
  slack-notify:
      runs-on: ubuntu-latest
      steps:
        - name: Slack Notification
          uses: rtCamp/action-slack-notify@v2
          env:
              SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
              SLACK_TITLE: Docker Build Pipeline Triggered
              SLACK_MESSAGE: |
                  **Event:** ${{ github.event_name }}
                  **Actor:** ${{ github.actor }}
                  **Branch:** ${{ github.ref_name }}
                  **Commit:** ${{ github.event.head_commit.message }}
  
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Generate Image Tag (commit SHA) 
        id: tag
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,format=short
      
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ steps.tag.outputs.tags }}


      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin
      
      - name: Scan Docker Image with Trivy
        run: |
          trivy image \
          --format table \
          --exit-code 1 \
          --ignore-unfixed \
          --severity CRITICAL,HIGH \
          "${{ steps.tag.outputs.tags }}" \
          | tee trivy-report.txt

      - name: Upload Trivy Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
      
      - name: Push Docker Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.tags }}

      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
              Docker pipeline *${{ job.status }}*
              Actor: ${{ github.actor }}
              Repository: ${{ github.repository }}
              Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}