name: Docker Build, Scan and Push -Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore: 
      - '**/*.md'
      - '.github/workflows/**'

env:
  DOCKER_REPO: blessedsoft
  DOCKER_IMAGE_FRONTEND: blessedsoft/linker-frontend

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_REPO }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Generate Image Tag (commit SHA) 
        id: tag
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKER_IMAGE_FRONTEND }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,format=short
      
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ steps.tag.outputs.tags }}

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy
      
      - name: Scan Docker Image with Trivy
        run: |
          trivy image \
          --format table \
          --exit-code 1 \
          --ignore-unfixed \
          --severity CRITICAL,HIGH \
          "${{ steps.tag.outputs.tags }}" \
          | tee trivy-report.txt

      - name: Upload Trivy Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
      
      - name: Push Docker Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.tags }}